#cloud-config
# Cloud-init exécuté au premier boot de chaque instance.
# Volontairement minimal : on délègue le gros à ansible/prep-hosts.yml.
package_update: true
package_upgrade: false

packages:
  - python3
  - python3-pip
  - python3-venv

write_files:
  - path: /etc/sysctl.d/99-kolla.conf
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1

runcmd:
  - modprobe br_netfilter
  - modprobe nf_conntrack
  - sysctl --system
  - timedatectl set-timezone Europe/Paris
  - systemctl disable --now ufw || true
