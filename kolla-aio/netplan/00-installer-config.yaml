# /etc/netplan/00-installer-config.yaml
# Adapter : noms d'interfaces, IP, gateway, DNS
network:
  version: 2
  ethernets:
    ens3:
      dhcp4: false
      addresses: [192.168.10.50/24]
      routes:
        - to: default
          via: 192.168.10.1
      nameservers:
        addresses: [1.1.1.1, 8.8.8.8]
    ens4:
      dhcp4: false
      dhcp6: false
      # Pas d'adresse : interface dédiée à Neutron (réseau externe)
